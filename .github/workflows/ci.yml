name: CI/CD

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=nami_core --cov-report=term-missing
        env:
          NAMI_AUDIT_DB: /tmp/test_audit.db

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS (staging check + production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/nami-core || git clone https://github.com/paopaonyapi-creator/nami-core.git /opt/nami-core
            cd /opt/nami-core && git checkout -- . && git pull
            source .venv/bin/activate && pip install -e . 2>&1 | tail -3
            cp deploy/dashboard.html /opt/nami-landing/dashboard.html 2>/dev/null || true
            systemctl restart nami-core
            sleep 5
            systemctl is-active nami-core || (journalctl -u nami-core --no-pager -n 20 && exit 1)
            curl -sf http://127.0.0.1:8092/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', 'health check failed'; print(f'{len(d[\"workers\"])} workers OK')"

  release:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Nami Core ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
