server {
    listen 80 default_server;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen [::]:80 default_server;
    ssl_certificate /etc/letsencrypt/live/178.104.181.132.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/178.104.181.132.nip.io/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/178.104.181.132.nip.io/chain.pem;
    server_name 178.104.181.132 nami.178.104.181.132.nip.io;

    root /opt/nami-landing;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy — no auth (dashboard calls these from Netlify)
    location ~ ^/(health|workers|metrics|metrics/prometheus|docs|redoc|openapi.json|audit|cache|db|scheduler|ws) {
        proxy_pass http://127.0.0.1:8092;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Dispatch endpoint — requires API key auth (handled by FastAPI)
    location /dispatch {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files — auth protected
    location / {
        auth_basic "Nami Dashboard";
        auth_basic_user_file /etc/nami-harness/dashboard.htpasswd;
        try_files $uri $uri/ =404;
    }
}
