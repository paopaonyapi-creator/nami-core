server {
    listen 443 ssl;
    server_name nami-api.178.104.181.132.nip.io;

    ssl_certificate /etc/letsencrypt/live/178.104.181.132.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/178.104.181.132.nip.io/privkey.pem;

    location /ws {
        proxy_pass http://127.0.0.1:8092;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /metrics {
        auth_basic "Nami Metrics";
        auth_basic_user_file /etc/nami-harness/dashboard.htpasswd;
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name nami-api.178.104.181.132.nip.io;
    return 301 https://$host$request_uri;
}
