server {
    listen 80;
    server_name _;

    # Nami Core API
    location /api/ {
        proxy_pass http://127.0.0.1:8700/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nami Status
    location /status/ {
        proxy_pass http://127.0.0.1:8701/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Nami Premium Landing (static mirror)
    location /premium/ {
        alias /var/www/nami-premium/;
        index index.html;
        try_files $uri $uri/ /premium/index.html;
    }

    # Health endpoint
    location /health {
        proxy_pass http://127.0.0.1:8701/health;
        proxy_set_header Host $host;
    }
}
