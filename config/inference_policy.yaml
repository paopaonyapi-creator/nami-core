# ═══════════════════════════════════════════════════════════════
# INFERENCE POLICY — Production Safety Controls
# ═══════════════════════════════════════════════════════════════
# enabled:        false → blocks ALL LLM calls (hard kill-switch)
# dry_run:        true  → logs requests, returns stub (no API spend)
# max_concurrent: 3     → max parallel API calls (semaphore)
#
# ROLLOUT ORDER:
#   1. enabled: false, dry_run: true    ← current (burn-in)
#   2. enabled: true,  dry_run: true    ← test planner, no spend
#   3. enabled: true,  dry_run: false   ← real traffic, guarded
# ═══════════════════════════════════════════════════════════════

enabled: true
dry_run: true
max_concurrent: 3

routes:
  - pattern: "ollama:*"
    backend: "http://127.0.0.1:11434/v1/chat/completions"
    budget_per_hour:
      tokens: 500000
      cost_usd: 0
  - pattern: "maxplus:*"
    backend: "${MAXPLUS_URL}/v1/chat/completions"
    budget_per_hour:
      tokens: 200000
      cost_usd: 5.0
  - pattern: "openai:*"
    backend: "https://api.openai.com/v1/chat/completions"
    budget_per_hour:
      tokens: 100000
      cost_usd: 10.0
fallback_order:
  - "ollama:qwen2.5:3b"
  - "maxplus:default"
cache:
  enabled: true
  ttl_seconds: 86400
  only_temperature_zero: true

