servers:
  # Keep NAMI_MCP_READ_ONLY_GATE=true until the controlled rollout gate opens
  # write-capable MCP tools. Prefer read_only/protected_read during validation.
  - name: local_tools
    transport: stdio
    command: node
    args:
      - ./mcp-server.js
    env:
      NODE_ENV: production
    tool_prefix: mcp.local
    permission_level: protected_read

  - name: remote_search
    transport: sse
    url: http://127.0.0.1:8001/sse
    enabled: false
    tool_prefix: mcp.remote
    permission_level: read_only

  - name: websocket_tools
    transport: websocket
    url: ws://127.0.0.1:8002/mcp
    enabled: false
    tool_prefix: mcp.ws
    permission_level: protected_read
