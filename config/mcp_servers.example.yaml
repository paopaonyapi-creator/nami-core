servers:
  - name: local_tools
    transport: stdio
    command: node
    args:
      - ./mcp-server.js
    env:
      NODE_ENV: production
    tool_prefix: mcp.local
    permission_level: protected_read

  - name: remote_search
    transport: sse
    url: http://127.0.0.1:8001/sse
    enabled: false
    permission_level: read_only