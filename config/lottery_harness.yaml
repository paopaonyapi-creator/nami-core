name: lottery
allowed_agents:
  - hermes
allowed_actions:
  - predict
  - send_prediction
  - fetch_results
  - vip
  - latest_prediction
  - accuracy_stats
  - history
  - hot_cold
  - predict_v6
  - accuracy_v6
  - get_active_engine
  - compare_engines
  - backtest_v6
  - sweep_v6_weights
max_daily_actions: 200
rate_limit:
  max_events: 10
  window_seconds: 60
circuit_breaker:
  failure_threshold: 3
budget_guard:
  max_cost: 2.0
quality:
  forbid_terms:
    - guarantee
    - แน่นอน
    - 100%
    - การันตี
sensor_path: /var/log/nami-harness/lottery.jsonl
