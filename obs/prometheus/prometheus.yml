global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/nami-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["host.docker.internal:9093"]

scrape_configs:
  - job_name: nami-core
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["host.docker.internal:8092"]

  - job_name: node-exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: alertmanager
    static_configs:
      - targets: ["host.docker.internal:9093"]

  - job_name: blackbox-exporter
    static_configs:
      - targets: ["host.docker.internal:9115"]

  - job_name: nami-business-exporter
    static_configs:
      - targets: ["host.docker.internal:9120"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
